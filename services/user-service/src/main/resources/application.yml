spring:
  application:
    name: user-service

  # ?? Database ?????????????????????????????????????????????????????
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shopflow_users}
    username: ${DB_USERNAME:shopflow}
    password: ${DB_PASSWORD:shopflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  # ?? JPA ??????????????????????????????????????????????????????????
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages DDL ? never let Hibernate touch it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ?? Flyway ???????????????????????????????????????????????????????
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ?? Redis ?????????????????????????????????????????????????????????
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

# ?? Server ??????????????????????????????????????????????????????????
server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

# ?? Actuator ?????????????????????????????????????????????????????????
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true   # /actuator/health/liveness and /readiness for ECS

# ?? JWT ??????????????????????????????????????????????????????????????
jwt:
  secret: ${JWT_SECRET:shopflow-super-secret-key-change-this-in-production-min-256-bits}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}       # 15 minutes
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days

# ?? OpenAPI ??????????????????????????????????????????????????????????
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ?? Logging ??????????????????????????????????????????????????????????
logging:
  level:
    com.shopflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId}] [%X{correlationId}] %logger{36} - %msg%n"

---
# ?? Test profile ?????????????????????????????????????????????????????
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
